name: Link Checker

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build documentation
        run: mkdocs build

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.sha }}
          restore-keys: |
            lychee-cache-

      # PRs: internal links only (fast, catches broken cross-references)
      - name: Check internal links (PR)
        if: github.event_name == 'pull_request'
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --base './site'
            --cache
            --max-cache-age 1d
            --exclude '^https?://'
            --exclude '^mailto:'
            ./site
          fail: false
          output: ./linkcheck-results.txt

      # Push/schedule/manual: full check including external links
      - name: Check all links
        if: github.event_name != 'pull_request'
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --base './site'
            --cache
            --max-cache-age 7d
            --exclude '^https://app\.limacharlie\.io'
            --exclude '^https://community\.limacharlie\.io'
            --exclude '^mailto:'
            ./site
          fail: false
          output: ./linkcheck-results.txt

      - name: Upload link check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linkcheck-results
          path: linkcheck-results.txt
          retention-days: 7

      - name: Comment on PR with broken links
        if: github.event_name == 'pull_request' && hashFiles('linkcheck-results.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('linkcheck-results.txt', 'utf8');

            // Extract lines with errors
            const brokenLinks = results.split('\n')
              .filter(line => line.includes('[ERROR]') || line.includes('Failed'))
              .slice(0, 20)
              .join('\n');

            if (brokenLinks) {
              const body = `## Broken Links Detected

            The link checker found some issues:

            \`\`\`
            ${brokenLinks}
            \`\`\`

            Please fix these broken links before merging.

            <details>
            <summary>Full results</summary>

            See the uploaded artifact for complete link check results.
            </details>`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
            }

  check-markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check markdown formatting
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: 'docs/**/*.md'
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false
            }
        continue-on-error: true
