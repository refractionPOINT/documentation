name: Link Checker

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'

# Least privilege at the workflow scope; jobs opt in to more where needed.
permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Only run for pull requests from branches in this repository (collaborators),
    # not from forks; external contributions are not accepted for this repository.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build documentation
        run: mkdocs build

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.sha }}
          restore-keys: |
            lychee-cache-

      # PRs: internal links only (fast, catches broken cross-references).
      # Blocking (fail: true): a broken internal cross-reference is a real
      # regression introduced by the PR, so it should fail the check.
      - name: Check internal links (PR)
        if: github.event_name == 'pull_request'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --root-dir '${{ github.workspace }}/site'
            --cache
            --max-cache-age 1d
            --exclude '^https?://'
            --exclude '^mailto:'
            ./site
          fail: true
          output: ./linkcheck-results.txt

      # Push/schedule/manual: full check including external links.
      # Advisory (fail: false): external sites go down or rate-limit for reasons
      # outside our control, so a transient external failure must not block.
      - name: Check all links
        if: github.event_name != 'pull_request'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --root-dir '${{ github.workspace }}/site'
            --cache
            --max-cache-age 7d
            --exclude '^https://app\.limacharlie\.io'
            --exclude '^https://community\.limacharlie\.io'
            --exclude '^mailto:'
            ./site
          fail: false
          output: ./linkcheck-results.txt

      - name: Upload link check results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: linkcheck-results
          path: linkcheck-results.txt
          retention-days: 1

  # The comment job is split out so that pull-requests: write is granted only to
  # the step that needs it, not to the job that builds the docs and runs lychee.
  comment-links:
    needs: check-links
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    # Post the results comment even when the link check above failed, but only
    # for pull requests from branches in this repository (not forks).
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Download link check results
        uses: actions/download-artifact@v8
        with:
          name: linkcheck-results

      - name: Comment on PR with broken links
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('linkcheck-results.txt')) return;
            const results = fs.readFileSync('linkcheck-results.txt', 'utf8');

            // Extract lines with errors
            const brokenLinks = results.split('\n')
              .filter(line => line.includes('[ERROR]') || line.includes('Failed'))
              .slice(0, 20)
              .join('\n');

            if (!brokenLinks) return;

            const body = `## Broken Links Detected

            The link checker found some issues:

            \`\`\`
            ${brokenLinks}
            \`\`\`

            Please fix these broken links before merging.

            <details>
            <summary>Full results</summary>

            See the uploaded artifact for complete link check results.
            </details>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

  check-markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check markdown formatting
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101  # v22
        with:
          globs: 'docs/**/*.md'
